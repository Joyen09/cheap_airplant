name: 機票查價

on:
  schedule:
    # 每 5 分鐘跑一次（GitHub 排程的最短間隔）。實際偶爾會延遲幾分鐘，屬正常現象。
    - cron: "*/5 * * * *"
  workflow_dispatch: {}  # 也可在 Actions 頁面手動按「Run workflow」立即跑一次

# 避免兩次排程同時跑，造成狀態檔衝突
concurrency:
  group: flight-check
  cancel-in-progress: false

# 狀態檔改存 Actions cache、不再 commit 回 repo：
# bot_state.json 裡有使用者的 chat id 與旅行計畫（誰、哪天出發、哪天回來），
# 放進版控（尤其公開 repo）等於公告行程。cache 只有 repo 的 Actions 讀得到。
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 安裝相依套件
        # fast-flights = 主力資料來源（Google Flights，免金鑰）；
        # 沒裝的話模式 A 只能靠 SerpApi / Travelpayouts 備援
        run: pip install requests python-dotenv fast-flights

      - name: 還原上次的狀態（Actions cache）
        uses: actions/cache/restore@v4
        with:
          path: bot_state.json
          # run_id 每次都不同，精確 key 一定 miss，
          # 實際由 restore-keys 的前綴比對撈「最近一次保存」的狀態
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: 查價 & 處理訊息
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # 機票資料來源備援（可選；主力 Google Flights 免金鑰）
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          # Travelpayouts 分潤 marker（可選；設了通知就會多附含分潤的訂票連結）
          TRAVELPAYOUTS_MARKER: ${{ vars.TRAVELPAYOUTS_MARKER || '' }}
          CURRENCY: ${{ vars.CURRENCY || 'TWD' }}
          ADULTS: ${{ vars.ADULTS || '1' }}
          GOOD_DEAL_RATIO: ${{ vars.GOOD_DEAL_RATIO || '0.15' }}
          BASELINE_MIN_SAMPLES: ${{ vars.BASELINE_MIN_SAMPLES || '10' }}
          DIGEST_HOUR: ${{ vars.DIGEST_HOUR || '9' }}
          STATE_PATH: bot_state.json
        run: python runner.py

      - name: 保存狀態（Actions cache）
        # 只要狀態檔存在就保存——就算查價步驟失敗，已讀掉的 Telegram offset 也要留住
        if: ${{ always() && hashFiles('bot_state.json') != '' }}
        uses: actions/cache/save@v4
        with:
          path: bot_state.json
          key: bot-state-${{ github.run_id }}
